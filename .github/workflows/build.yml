name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov pytest-qt ruff psutil
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test (headless on Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --cov=jimao_translator --cov-report=term-missing -m "not performance"
      - name: Test
        if: runner.os != 'Linux'
        run: pytest --cov=jimao_translator --cov-report=term-missing -m "not performance"

  package:
    name: package-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build
        run: pyinstaller packaging/jimao_translator.spec
      - uses: actions/upload-artifact@v4
        with:
          name: jimao-translator-${{ matrix.os }}
          path: dist/jimao_translator/
